<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Admin Dashboard - Palash Mahmod</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --cream-bg: #FFFBF0; 
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cream-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 400px;
        }
        /* Shared Header Style */
        .header-profile {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 5px;
        }
        .profile-pic {
            width: 80px;
            height: 106px; /* 3:4 ratio */
            border: 1px solid #000;
            object-fit: cover;
            border-radius: 4px;
        }
        .profile-info {
            color: var(--primary-color);
            line-height: 1.4;
            text-align: left;
        }
        .profile-info h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: #1a202c;
        }
        .profile-info p {
            margin: 1px 0;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }
        .divider {
            height: 1.5px;
            background-color: #000;
            margin: 10px 0 20px 0;
            border: none;
        }
        /* Login Form */
        .login-form {
            text-align: center;
        }
        .login-form input {
            padding: 12px; width: 100%; border: 1px solid #ddd;
            border-radius: 8px; margin-bottom: 15px; display: block;
            font-size: 16px; box-sizing: border-box;
            background: #f9fafb;
        }
        .login-form button {
            background: var(--accent-color); color: white; border: none;
            padding: 12px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 100%; font-size: 16px;
            transition: 0.3s;
        }
        .login-form button:hover { background: #2980b9; }

        /* Main Dashboard Container */
        .dashboard {
            width: 95%;
            max-width: 550px;
            background: var(--white);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            display: none;
        }
        /* 3D Button Grid */
        .nav-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            padding: 5px;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            padding: 20px;
            text-decoration: none;
            color: var(--white);
            border-radius: 20px;
            font-weight: 700;
            text-align: center;
            font-size: 15px;
            background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(0,0,0,0.05));
            box-shadow: 0 10px 20px rgba(0,0,0,0.12), inset 0 -5px 0 rgba(0,0,0,0.2); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn i { font-size: 42px; margin-bottom: 15px; }
        .nav-btn:hover { transform: translateY(-6px); }
        .nav-btn:active { transform: translateY(3px); }

        .btn-a { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-b { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        .btn-c { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-d { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }

        .logout-link {
            display: block; text-align: center; margin-top: 35px;
            color: #718096; font-size: 14px; text-decoration: none;
            font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <div class="header-profile">
                <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
                <div class="profile-info">
                    <h2>Palash Mahmod</h2>
                    <p>BSC(SCIENCE), MSC(BOTANY)</p>
                    <p>Mob: 01757935522</p>
                </div>
            </div>
            <hr class="divider">
            <div class="login-form">
                <input type="password" id="pass-input" placeholder="পাসওয়ার্ড দিন">
                <button onclick="checkLogin()">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div class="dashboard" id="main-content">
        <div class="header-profile">
            <img src="photo1.jpg" alt="Palash Mahmod" class="profile-pic">
            <div class="profile-info">
                <h2>Palash Mahmod</h2>
                <p>BSC(SCIENCE), MSC(BOTANY)</p>
                <p>Mob: 01757935522</p>
            </div>
        </div>
        <hr class="divider">
        <div class="nav-menu">
            <a href="file_A.html" class="nav-btn btn-a">
                <i class="fas fa-user-gear"></i>
                <span>ইউজার আইডি তৈরি</span>
            </a>
            <a href="file_B.html" class="nav-btn btn-b">
                <i class="fas fa-file-pen"></i>
                <span>MCQ প্রশ্ন তৈরি</span>
            </a>
            <a href="file_C.html" class="nav-btn btn-c">
                <i class="fas fa-list-check"></i>
                <span>প্রশ্ন সিলেকশন</span>
            </a>
            <a href="file_D.html" class="nav-btn btn-d">
                <i class="fas fa-square-poll-vertical"></i>
                <span>রেজাল্ট পর্যবেক্ষণ</span>
            </a>
        </div>
        <a class="logout-link" onclick="logout()">লগআউট করুন</a>
    </div>

    <script>
        const secret = "cG01NTIy"; // pm5522

        // পেজ লোড হলে চেক করা
        if(localStorage.getItem('isLoggedIn') === 'true') {
            showDashboard();
        }

        // ব্রাউজার ব্যাক বাটন বা হিস্ট্রি নেভিগেশনের জন্য ফিক্স
        window.onpageshow = function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                if(localStorage.getItem('isLoggedIn') === 'true') {
                    showDashboard();
                }
            }
        };

        function checkLogin() {
            const input = document.getElementById('pass-input').value;
            if(btoa(input) === secret) {
                localStorage.setItem('isLoggedIn', 'true');
                showDashboard();
            } else {
                alert("পাসওয়ার্ড সঠিক নয়!");
            }
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }
    </script>
</body>
</html>
