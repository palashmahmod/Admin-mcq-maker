<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result List - file_D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --d: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .back-btn { text-decoration: none; color: var(--p); font-weight: bold; background: #eee; padding: 8px 15px; border-radius: 8px; }
        .res-card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; transition: 0.2s; }
        .res-card:hover { border-color: var(--a); background: #f9f9f9; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .score-badge { background: #e8f5e9; color: #2e7d32; }
        .wrong-badge { background: #ffebee; color: #c62828; }
        .del-btn { position: absolute; top: 15px; right: 15px; color: var(--d); cursor: pointer; border: none; background: none; font-size: 18px; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> ব্যাক</a>
        <h2 style="margin:0; font-size: 18px;">ফলাফল তালিকা</h2>
        <button onclick="clearAllResults()" style="background:var(--d); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">সব মুছুন</button>
    </div>

    <input type="text" id="search" class="search-box" placeholder="নাম বা কুইজ দিয়ে খুঁজুন..." oninput="filterResults()">

    <div id="resultsArea">লোড হচ্ছে...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allResults = [];

    function fetchResults() {
        db.ref('QuizResults').on('value', (snap) => {
            allResults = [];
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(key => {
                    allResults.push({ id: key, ...data[key] });
                });
                allResults.reverse(); // নতুন ফলাফল আগে দেখাবে
            }
            renderResults(allResults);
        });
    }

    function renderResults(data) {
        const area = document.getElementById('resultsArea');
        if (data.length === 0) {
            area.innerHTML = "<p style='text-align:center'>কোনো ফলাফল পাওয়া যায়নি।</p>";
            return;
        }

        area.innerHTML = data.map(r => `
            <div class="res-card">
                <button class="del-btn" onclick="deleteResult('${r.id}')"><i class="fas fa-trash-alt"></i></button>
                <div style="font-weight:bold; font-size: 16px; color: var(--p);">${r.name} <span style="font-size:12px; color:#777;">(ID: ${r.roll})</span></div>
                <div style="font-size: 13px; margin-top:5px;">
                    <i class="fas fa-book"></i> কুইজ: <b>${r.quizTitle}</b> | বিষয়: ${r.subject}<br>
                    <i class="fas fa-graduation-cap"></i> শ্রেণি: ${r.cls} | শাখা: ${r.section} | রোল: ${r.roll}<br>
                    <i class="fas fa-clock"></i> সময়: ${r.startTime} (${r.duration})
                </div>
                <div class="badge score-badge">সঠিক: ${r.correct} / ${r.total}</div>
                <div class="badge wrong-badge">ভুল প্রশ্ন নং: ${r.wrongIndices || 'সব সঠিক'}</div>
            </div>
        `).join('');
    }

    function filterResults() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = allResults.filter(r => 
            r.name.toLowerCase().includes(term) || 
            r.quizTitle.toLowerCase().includes(term) ||
            r.roll.toString().includes(term)
        );
        renderResults(filtered);
    }

    function deleteResult(id) {
        if(confirm("এই ফলাফলটি মুছে ফেলতে চান?")) {
            db.ref('QuizResults/' + id).remove();
        }
    }

    function clearAllResults() {
        if(confirm("সাবধান! সব ফলাফল মুছে যাবে। আপনি কি নিশ্চিত?")) {
            db.ref('QuizResults').remove();
        }
    }

    window.onload = fetchResults;
</script>
</body>
</html>
