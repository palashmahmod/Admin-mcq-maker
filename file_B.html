<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MCQ Generator - Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 10px 0; z-index: 1000; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20 : px; }
        .config-card, .q-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--a); width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-gh { background: #24292e; }
        .preview-box { background: #fffde7; border: 1px dashed #fbc02d; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; z-index: 9999; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> &nbsp; গিটহাবে পাঠানো হচ্ছে...</div>

<div class="header">
    <button class="btn" onclick="location.href='index.html'" style="background:#555"><i class="fas fa-arrow-left"></i> ব্যাক</button>
    <b>কুইজ জেনারেটর প্যানেল</b>
    <button class="btn" style="background:var(--d)" onclick="clearAll()"><i class="fas fa-trash"></i> মুছুন</button>
</div>

<div class="container">
    <div class="config-card">
        <div class="grid-2">
            <input type="text" id="qTitle" placeholder="কুইজের নাম (উদা: মডেল টেস্ট ১)">
            <input type="text" id="qClass" placeholder="শ্রেণি">
            <input type="text" id="qSub" placeholder="বিষয়">
            <input type="text" id="qChap" placeholder="অধ্যায়">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)">
            <input type="number" id="qMarks" placeholder="পূর্ণমান">
            <input type="text" id="fName" placeholder="ফাইলের নাম (উদা: 101)">
        </div>
        <div class="grid-2" style="margin-top:10px;">
            <button class="btn" style="background:var(--s)" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-gh" onclick="uploadToGithub()"><i class="fab fa-github"></i> গিটহাবে আপলোড</button>
        </div>
    </div>

    <div id="q-area"></div>
    <button class="btn btn-add" onclick="addQ()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    const GITHUB_USER = "palashmahmod";
    const GITHUB_REPO = "quiz-files";
    let qCount = 0;

    function addQ(data = null) {
        qCount++;
        const id = Date.now() + qCount;
        const div = document.createElement('div');
        div.className = 'q-card';
        div.id = 'block-' + id;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between"><b>প্রশ্ন নং: ${qCount}</b> 
            <button onclick="removeQ('${id}')" style="color:red; border:none; background:none; cursor:pointer"><i class="fas fa-times"></i></button></div>
            <textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim">${data?data.stim:''}</textarea>
            <textarea placeholder="মূল প্রশ্ন" class="ques" oninput="updatePreview('${id}')">${data?data.ques:''}</textarea>
            <input type="text" placeholder="ছবির লিঙ্ক (যদি থাকে)" class="img" oninput="updatePreview('${id}')" value="${data?data.img:''}">
            <div class="grid-2">
                <input type="text" placeholder="ক)" class="o1" oninput="updatePreview('${id}')" value="${data?data.o1:''}">
                <input type="text" placeholder="খ)" class="o2" oninput="updatePreview('${id}')" value="${data?data.o2:''}">
                <input type="text" placeholder="গ)" class="o3" oninput="updatePreview('${id}')" value="${data?data.o3:''}">
                <input type="text" placeholder="ঘ)" class="o4" oninput="updatePreview('${id}')" value="${data?data.o4:''}">
            </div>
            <select class="ans">
                <option value="ক" ${data?.ans=='ক'?'selected':''}>সঠিক উত্তর: ক</option>
                <option value="খ" ${data?.ans=='খ'?'selected':''}>সঠিক উত্তর: খ</option>
                <option value="গ" ${data?.ans=='গ'?'selected':''}>সঠিক উত্তর: গ</option>
                <option value="ঘ" ${data?.ans=='ঘ'?'selected':''}>সঠিক উত্তর: ঘ</option>
            </select>
            <div class="preview-box" id="prev-${id}">প্রিভিউ লোড হচ্ছে...</div>
        `;
        document.getElementById('q-area').appendChild(div);
        updatePreview(id);
    }

    function updatePreview(id) {
        const block = document.getElementById('block-'+id);
        const q = block.querySelector('.ques').value;
        const o1 = block.querySelector('.o1').value;
        const prev = document.getElementById('prev-'+id);
        prev.innerHTML = `<b>প্রশ্ন:</b> ${q || '...'} <br> <b>ক)</b> ${o1 || '...'}`;
        if(window.MathJax) MathJax.typeset();
    }

    function removeQ(id) { document.getElementById('block-'+id).remove(); }

    function saveDraft() {
        const qs = [];
        document.querySelectorAll('.q-card').forEach(b => {
            qs.push({
                stim: b.querySelector('.stim').value, ques: b.querySelector('.ques').value,
                img: b.querySelector('.img').value, o1: b.querySelector('.o1').value,
                o2: b.querySelector('.o2').value, o3: b.querySelector('.o3').value,
                o4: b.querySelector('.o4').value, ans: b.querySelector('.ans').value
            });
        });
        const fullData = {
            title: document.getElementById('qTitle').value, cls: document.getElementById('qClass').value,
            sub: document.getElementById('qSub').value, chap: document.getElementById('qChap').value,
            time: document.getElementById('qTime').value, marks: document.getElementById('qMarks').value,
            fName: document.getElementById('fName').value, questions: qs
        };
        localStorage.setItem('draft_quiz', JSON.stringify(fullData));
    }

    // এই ফাংশনটি শিক্ষার্থীর জন্য HTML ফাইল তৈরি করবে
    function generateFullHTML() {
        const d = JSON.parse(localStorage.getItem('draft_quiz'));
        if(!d) return "";

        // শিক্ষার্থীর কুইজ পেজের কোড
        let html = '<!DOCTYPE html>\n<html lang="bn">\n<head>\n<meta charset="UTF-8">\n';
        html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
        html += '<title>' + d.title + '</title>\n';
        html += '<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>\n';
        html += '<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>\n';
        html += '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">\n';
        html += '<style>body{font-family:sans-serif; background:#f4f7f6; padding:15px; margin:0;} .card{background:white; padding:20px; border-radius:15px; max-width:600px; margin:10px auto; box-shadow:0 4px 10px rgba(0,0,0,0.1);} .info-box{background:#e3f2fd; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #bbdefb;} .q-box{border-bottom:1px solid #eee; padding:15px 0;} .opt{display:block; padding:10px; background:#f9f9f9; margin:5px 0; border-radius:8px; cursor:pointer;} input[type="radio"]{margin-right:10px;} .btn{width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:18px;}</style>\n';
        html += '</head>\n<body>\n';
        
        html += '<div class="card">\n<h2>' + d.title + '</h2>\n';
        html += '<div class="info-box">\n';
        html += '<b>নাম:</b> <span id="stName">--</span><br>\n';
        html += '<b>রোল:</b> <span id="stRoll">--</span> | <b>শ্রেণি:</b> ' + d.cls + '<br>\n';
        html += '<b>বিষয়:</b> ' + d.sub + ' | <b>সময়:</b> ' + d.time + ' মিনিট\n';
        html += '</div>\n';
        
        html += '<div id="quiz-area"></div>\n';
        html += '<button class="btn" id="subBtn" onclick="submitQuiz()">পরীক্ষা জমা দিন</button>\n';
        html += '</div>\n';

        html += '<script>\n';
        html += 'const firebaseConfig = { apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/", projectId: "quiz-storage-d8707" };\n';
        html += 'firebase.initializeApp(firebaseConfig);\n';
        html += 'const urlParams = new URLSearchParams(window.location.search);\n';
        html += 'const uData = { name: urlParams.get("name"), roll: urlParams.get("roll"), cls: urlParams.get("cls"), sec: urlParams.get("sec") };\n';
        html += 'document.getElementById("stName").innerText = uData.name || "অজানা";\n';
        html += 'document.getElementById("stRoll").innerText = uData.roll || "--";\n';
        
        html += 'const questions = ' + JSON.stringify(d.questions) + ';\n';
        html += 'const qArea = document.getElementById("quiz-area");\n';
        html += 'questions.forEach((q, i) => {\n';
        html += ' let h = `<div class="q-box"><b>${i+1}. ${q.ques}</b>`;\n';
        html += ' if(q.img) h += `<img src="${q.img}" style="max-width:100%; display:block; margin:10px 0;">`;\n';
        html += ' ["ক","খ","গ","ঘ"].forEach((opt, j) => {\n';
        html += '  h += `<label class="opt"><input type="radio" name="q${i}" value="${opt}"> ${opt}) ${q["o"+(j+1)]}</label>`;\n';
        html += ' });\n h += `</div>`; qArea.innerHTML += h;\n});\n';

        html += 'function submitQuiz() {\n';
        html += ' let score = 0; let wrong = [];\n';
        html += ' questions.forEach((q, i) => {\n';
        html += '  const selected = document.querySelector(`input[name="q${i}"]:checked`);\n';
        html += '  if(selected && selected.value === q.ans) score++; else wrong.push(i+1);\n';
        html += ' });\n';
        html += ' const res = { ...uData, correct: score, total: questions.length, wrongIndices: wrong.join(", "), quizTitle: "' + d.title + '", subject: "' + d.sub + '", timestamp: Date.now() };\n';
        html += ' firebase.database().ref("QuizResults").push(res).then(() => { alert("আপনার স্কোর: " + score); window.close(); });\n';
        html += '}\n<\/script>\n</body>\n</html>';
        
        return html;
    }

    async function uploadToGithub() {
        saveDraft();
        const fName = document.getElementById('fName').value;
        if(!fName) return alert("ফাইলের নাম দিন!");
        
        let token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("GitHub Token দিন:");
            if(token) localStorage.setItem('gh_token', token);
        }

        document.getElementById('loader').style.display='flex';
        const content = btoa(unescape(encodeURIComponent(generateFullHTML())));
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fName}.html`;

        try {
            const check = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            let sha = "";
            if(check.ok) { const d = await check.json(); sha = d.sha; }

            const res = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Quiz Upload", content: content, sha: sha || undefined })
            });

            document.getElementById('loader').style.display='none';
            if(res.ok) alert("সফলভাবে আপলোড হয়েছে!"); else alert("আপলোড ব্যর্থ। টোকেন চেক করুন।");
        } catch(e) { 
            document.getElementById('loader').style.display='none'; 
            alert("Error: " + e.message); 
        }
    }

    function clearAll() { if(confirm("সব মুছতে চান?")) { localStorage.removeItem('draft_quiz'); location.reload(); } }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('draft_quiz'));
        if(saved) {
            document.getElementById('qTitle').value = saved.title || '';
            document.getElementById('qClass').value = saved.cls || '';
            document.getElementById('qSub').value = saved.sub || '';
            document.getElementById('qTime').value = saved.time || '';
            document.getElementById('fName').value = saved.fName || '';
            if(saved.questions) saved.questions.forEach(q => addQ(q));
        } else {
            addQ();
        }
    };
</script>
</body>
</html>
