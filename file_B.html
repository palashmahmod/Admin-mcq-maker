<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master MCQ Generator - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 10px 0; z-index: 1000; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .config-card, .q-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--a); width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-gh { background: #24292e; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 9999; align-items: center; justify-content: center; font-size: 20px; flex-direction: column; }
        .preview-box { background: #eef7ff; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px dashed var(--a); font-size: 14px; }
        .preview-label { font-size: 11px; color: var(--a); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .img-preview-container { position: relative; display: inline-block; margin: 10px 0; }
        .img-preview-container img { max-width: 150px; border-radius: 8px; display: block; border: 1px solid #ddd; }
        .del-img { position: absolute; top: -5px; right: -5px; background: var(--d); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
        .file-input-wrapper { margin: 10px 0; }
        .btn-paste { background: #673ab7; margin-top: 10px; width: 100%; }
        .mini-paste { background: #673ab7; font-size: 10px; padding: 2px 8px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <i class="fas fa-spinner fa-spin fa-3x"></i>
    <p style="margin-top: 15px;">মাস্টার কুইজ ফাইল তৈরি ও আপলোড হচ্ছে...</p>
</div>

<div class="header">
    <button class="btn" onclick="location.href='index.html'" style="background:#555"><i class="fas fa-arrow-left"></i> ব্যাক</button>
    <b>মাস্টার কুইজ জেনারেটর (Pro)</b>
    <button class="btn" style="background:var(--d)" onclick="clearAll()"><i class="fas fa-trash"></i> মুছুন</button>
</div>

<div class="container">
    <div class="config-card">
        <div class="grid-2">
            <input type="text" id="qTitle" placeholder="কুইজের নাম">
            <input type="text" id="qClass" placeholder="শ্রেণি">
            <input type="text" id="qSub" placeholder="বিষয়">
            <input type="text" id="qChap" placeholder="অধ্যায়">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)">
            <input type="number" id="qMarks" placeholder="পূর্ণমান">
            <input type="text" id="fName" placeholder="ফাইলের নাম (যেমন: 601)">
        </div>
        <div class="grid-2" style="margin-top:10px;">
            <button class="btn" style="background:var(--s)" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-gh" onclick="uploadToGithub()"><i class="fab fa-github"></i> মাস্টার কুইজ আপলোড</button>
        </div>
        <button class="btn btn-paste" onclick="bulkPaste()"><i class="fas fa-paste"></i> একসাথে অনেক প্রশ্ন পেস্ট করুন</button>
        <button class="btn" style="background:#7f8c8d; width: 100%; margin-top: 10px;" onclick="resetToken()"><i class="fas fa-key"></i> GitHub টুকেন রিসেট</button>
    </div>

    <div id="q-area"></div>
    <button class="btn btn-add" onclick="addQ()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    const GITHUB_USER = "palashmahmod";
    const GITHUB_REPO = "quiz-files";
    let qCount = 0;

    function addQ(data = null) {
        qCount++;
        const id = Date.now() + qCount;
        const div = document.createElement('div');
        div.className = 'q-card';
        div.id = 'block-' + id;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><b>প্রশ্ন নং: <span class="q-num-display">${qCount}</span></b> 
                <button class="btn mini-paste" onclick="individualPaste('${id}')"><i class="fas fa-paste"></i> পেস্ট</button></span>
                <button onclick="removeQ('${id}')" style="color:red; border:none; background:none; cursor:pointer"><i class="fas fa-times"></i></button>
            </div>
            <textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim" oninput="updatePreview('${id}')">${data?data.stim:''}</textarea>
            <textarea placeholder="মূল প্রশ্ন" class="ques" oninput="updatePreview('${id}')">${data?data.ques:''}</textarea>
            <div class="file-input-wrapper">
                <input type="file" accept="image/*" onchange="handleImage(this, '${id}')">
                <div id="img-preview-${id}" class="img-preview-container" style="${(data && data.img) ? '' : 'display:none'}">
                    <img src="${(data && data.img) ? data.img : ''}" id="img-data-${id}">
                    <button class="del-img" onclick="removeImg('${id}')">×</button>
                </div>
            </div>
            <div class="grid-2">
                <input type="text" placeholder="ক)" class="o1" oninput="updatePreview('${id}')" value="${data?data.o1:''}">
                <input type="text" placeholder="খ)" class="o2" oninput="updatePreview('${id}')" value="${data?data.o2:''}">
                <input type="text" placeholder="গ)" class="o3" oninput="updatePreview('${id}')" value="${data?data.o3:''}">
                <input type="text" placeholder="ঘ)" class="o4" oninput="updatePreview('${id}')" value="${data?data.o4:''}">
            </div>
            <select class="ans">
                <option value="ক" ${data && data.ans=='ক'?'selected':''}>সঠিক উত্তর: ক</option>
                <option value="খ" ${data && data.ans=='খ'?'selected':''}>সঠিক উত্তর: খ</option>
                <option value="গ" ${data && data.ans=='গ'?'selected':''}>সঠিক উত্তর: গ</option>
                <option value="ঘ" ${data && data.ans=='ঘ'?'selected':''}>সঠিক উত্তর: ঘ</option>
            </select>
            <div class="preview-box">
                <div id="preview-content-${id}"></div>
            </div>
        `;
        document.getElementById('q-area').appendChild(div);
        updatePreview(id);
        return id;
    }

    function handleImage(input, id) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('img-data-' + id).src = e.target.result;
                document.getElementById('img-preview-' + id).style.display = 'inline-block';
                updatePreview(id);
            };
            reader.readAsDataURL(file);
        }
    }

    function removeImg(id) {
        document.getElementById('img-data-' + id).src = '';
        document.getElementById('img-preview-' + id).style.display = 'none';
        updatePreview(id);
    }

    function updatePreview(id) {
        const block = document.getElementById('block-' + id);
        if(!block) return;
        const stim = block.querySelector('.stim').value;
        const ques = block.querySelector('.ques').value;
        const img = document.getElementById('img-data-' + id).src;
        const num = block.querySelector('.q-num-display').innerText;
        let html = `<div>${stim ? stim + '<br>' : ''}<b>${num}. ${ques}</b></div>`;
        if (img && img.startsWith('data:image')) html += `<img src="${img}" style="max-width:100px;"><br>`;
        document.getElementById('preview-content-' + id).innerHTML = html;
    }

    function removeQ(id) { document.getElementById('block-'+id).remove(); }

    function saveDraft() {
        const qs = [];
        document.querySelectorAll('.q-card').forEach(b => {
            const id = b.id.replace('block-', '');
            qs.push({
                stim: b.querySelector('.stim').value, 
                ques: b.querySelector('.ques').value,
                img: document.getElementById('img-data-' + id).src.startsWith('data:image') ? document.getElementById('img-data-' + id).src : '', 
                o1: b.querySelector('.o1').value, o2: b.querySelector('.o2').value, 
                o3: b.querySelector('.o3').value, o4: b.querySelector('.o4').value, 
                ans: b.querySelector('.ans').value
            });
        });
        const fullData = {
            title: document.getElementById('qTitle').value, cls: document.getElementById('qClass').value,
            sub: document.getElementById('qSub').value, chap: document.getElementById('qChap').value,
            time: document.getElementById('qTime').value, marks: document.getElementById('qMarks').value,
            fName: document.getElementById('fName').value, questions: qs
        };
        localStorage.setItem('draft_quiz', JSON.stringify(fullData));
    }

    function generateFullHTML() {
        const d = JSON.parse(localStorage.getItem('draft_quiz'));
        if(!d) return "";
        const qJson = JSON.stringify(d.questions);
        
        return `<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>${d.title}</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .timer { position: fixed; top: 0; width: 100%; background: #e74c3c; color: white; text-align: center; padding: 8px 0; z-index: 1000; }
        .opt { display: block; padding: 12px; background: #f9f9f9; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; }
        .correct { background: #d4edda !important; } .wrong { background: #f8d7da !important; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>
    <div id="p1" class="page active">
        <div class="card">
            <h2>${d.title}</h2>
            <p>বিষয়: ${d.sub} | সময়: ${d.time} মিনিট</p>
            <button onclick="startExam()" style="width:100%; padding:15px; background:green; color:white; border:none; border-radius:10px;">শুরু করুন</button>
        </div>
    </div>
    <div id="p2" class="page">
        <div class="timer" id="tDisp"></div>
        <div class="card" style="margin-top:50px;" id="qArea"></div>
        <button onclick="submitQuiz()" style="width:100%; padding:15px; background:blue; color:white; margin-top:20px;">জমা দিন</button>
    </div>
    <script>
        const config = { apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const questions = ${qJson};
        let timer;
        function startExam() {
            document.getElementById('p1').classList.remove('active');
            document.getElementById('p2').classList.add('active');
            render();
            let time = ${d.time} * 60;
            timer = setInterval(() => {
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('tDisp').innerText = "সময় বাকি: " + m + ":" + (s<10?'0':'')+s;
                if(time <= 0) submitQuiz();
                time--;
            }, 1000);
        }
        function render() {
            let h = '';
            questions.forEach((q, i) => {
                h += '<div><p>'+(i+1)+'. '+q.ques+'</p>'+
                ['ক','খ','গ','ঘ'].map((o, j) => '<label class="opt"><input type="radio" name="q'+i+'" value="'+o+'"> '+o+') '+q['o'+(j+1)]+'</label>').join('')+'</div>';
            });
            document.getElementById('qArea').innerHTML = h;
        }
        function submitQuiz() {
            clearInterval(timer);
            alert("পরীক্ষা সম্পন্ন হয়েছে!");
            location.reload();
        }
    <\/script>
</body>
</html>`;
    }

    async function uploadToGithub() {
        saveDraft();
        const fName = document.getElementById('fName').value;
        const token = localStorage.getItem('gh_token') || prompt("GitHub Token দিন:");
        if(!token) return;
        localStorage.setItem('gh_token', token);
        document.getElementById('loader').style.display='flex';
        const content = btoa(unescape(encodeURIComponent(generateFullHTML())));
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fName}.html`;
        try {
            const check = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            let sha = ""; if(check.ok) { const d = await check.json(); sha = d.sha; }
            const res = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}` },
                body: JSON.stringify({ message: "upload", content: content, sha: sha || undefined })
            });
            alert(res.ok ? "সফল!" : "ব্যর্থ!");
        } catch(e) { alert("Error: " + e.message); }
        document.getElementById('loader').style.display='none';
    }

    function resetToken() { localStorage.removeItem('gh_token'); alert("রিসেট হয়েছে"); }
    function clearAll() { localStorage.removeItem('draft_quiz'); location.reload(); }

    window.onload = () => {
        const saved = localStorage.getItem('draft_quiz');
        if(saved) {
            const d = JSON.parse(saved);
            document.getElementById('qTitle').value = d.title || '';
            document.getElementById('qClass').value = d.cls || '';
            document.getElementById('qSub').value = d.sub || '';
            document.getElementById('qChap').value = d.chap || '';
            document.getElementById('qTime').value = d.time || '';
            document.getElementById('qMarks').value = d.marks || '';
            document.getElementById('fName').value = d.fName || '';
            if(d.questions) d.questions.forEach(q => addQ(q)); else addQ();
        } else addQ();
    };
</script>
</body>
</html>
