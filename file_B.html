<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz Generator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MathJax Configuration for Single Dollar Support -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-top: 60px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 12px 0; z-index: 1000; text-align: center; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: inline-block; text-decoration: none; text-align: center; }
        .btn-blue { background: var(--a); width: 100%; margin-top: 10px; }
        .btn-green { background: var(--s); width: 48%; }
        .btn-black { background: #24292e; width: 48%; }
        .btn-red { background: var(--d); padding: 5px 10px; font-size: 12px; }
        .q-box { border-left: 4px solid var(--a); padding-left: 15px; position: relative; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .grid { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .live-preview { margin-top: 15px; padding: 10px; background: #fffbe6; border: 1px dashed #ffe58f; border-radius: 8px; font-size: 14px; min-height: 50px; }
        .p-stim { background: #f9f9f9; padding: 8px; border-left: 3px solid #3498db; margin-bottom: 8px; font-style: italic; }
        .p-img { width: 100%; border-radius: 6px; margin: 8px 0; display: none; }
        .p-opt { display: block; padding: 5px 10px; background: #eee; margin: 4px 0; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p>প্রসেসিং হচ্ছে...</p>
</div>

<div class="header">মাস্টার কুইজ জেনারেটর</div>

<div class="container">
    <div class="card">
        <input type="text" id="qTitle" placeholder="কুইজের টাইটেল">
        <div class="grid">
            <input type="text" id="qSub" placeholder="বিষয়" style="width:48%">
            <input type="text" id="qChapter" placeholder="অধ্যায়" style="width:48%">
        </div>
        <div class="grid">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)" style="width:48%">
            <input type="text" id="fName" placeholder="ফাইলের নাম" style="width:48%">
        </div>
        <div class="grid" style="margin-top:10px;">
            <button class="btn btn-green" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-black" onclick="uploadToGithub()"><i class="fab fa-github"></i> আপলোড করুন</button>
        </div>
    </div>
    <div id="q-container"></div>
    <button class="btn btn-blue" onclick="addNewQuestion()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    var GITHUB_USER = "palashmahmod";
    var GITHUB_REPO = "quiz-files";
    var qCount = 0;

    function updatePreview(id) {
        var box = document.getElementById(id);
        var pBox = box.querySelector('.live-preview');
        var stim = box.querySelector('.stim').value;
        var ques = box.querySelector('.ques').value;
        var img = box.querySelector('.img').value;
        var o1 = box.querySelector('.o1').value;
        var o2 = box.querySelector('.o2').value;
        var o3 = box.querySelector('.o3').value;
        var o4 = box.querySelector('.o4').value;
        var no = box.querySelector('.no').innerText;

        var html = '<b style="font-size:11px; color:#888;">LIVE PREVIEW</b><hr>';
        if(stim) html += '<div class="p-stim">' + stim.replace(/\n/g, '<br>') + '</div>';
        html += '<p><b>' + no + '. ' + ques + '</b></p>';
        if(img) html += '<img src="' + img + '" class="p-img" style="display:block">';
        if(o1) html += '<span class="p-opt">ক) ' + o1 + '</span>';
        if(o2) html += '<span class="p-opt">খ) ' + o2 + '</span>';
        if(o3) html += '<span class="p-opt">গ) ' + o3 + '</span>';
        if(o4) html += '<span class="p-opt">ঘ) ' + o4 + '</span>';
        
        pBox.innerHTML = html;

        // Re-render MathJax
        if (window.MathJax && window.MathJax.typesetPromise) {
            MathJax.typesetPromise([pBox]).catch(function (err) { console.log(err.message); });
        }
    }

    function addNewQuestion(data) {
        qCount++;
        var id = "q-" + Date.now();
        var div = document.createElement('div');
        div.className = 'card q-box';
        div.id = id;
        
        var stim = data ? data.stim : "";
        var ques = data ? data.ques : "";
        var img = data ? data.img : "";
        var o1 = data ? data.o1 : "";
        var o2 = data ? data.o2 : "";
        var o3 = data ? data.o3 : "";
        var o4 = data ? data.o4 : "";
        var ans = data ? data.ans : "ক";
        
        div.innerHTML = '<div style="display:flex; justify-content:space-between">' +
            '<b>প্রশ্ন নং: <span class="no">' + qCount + '</span></b>' +
            '<button class="btn btn-red" onclick="removeQuestion(\'' + id + '\')">X</button></div>' +
            '<textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim" oninput="updatePreview(\'' + id + '\')">' + stim + '</textarea>' +
            '<textarea placeholder="মূল প্রশ্ন" class="ques" oninput="updatePreview(\'' + id + '\')">' + ques + '</textarea>' +
            '<input type="text" placeholder="ছবির লিঙ্ক" class="img" value="' + img + '" oninput="updatePreview(\'' + id + '\')">' +
            '<div class="grid"><input type="text" placeholder="ক)" class="o1" value="' + o1 + '" style="width:48%" oninput="updatePreview(\'' + id + '\')">' +
            '<input type="text" placeholder="খ)" class="o2" value="' + o2 + '" style="width:48%" oninput="updatePreview(\'' + id + '\')"></div>' +
            '<div class="grid"><input type="text" placeholder="গ)" class="o3" value="' + o3 + '" style="width:48%" oninput="updatePreview(\'' + id + '\')">' +
            '<input type="text" placeholder="ঘ)" class="o4" value="' + o4 + '" style="width:48%" oninput="updatePreview(\'' + id + '\')"></div>' +
            '<select class="ans"><option value="ক" '+(ans=='ক'?'selected':'')+'>সঠিক: ক</option><option value="খ" '+(ans=='খ'?'selected':'')+'>সঠিক: খ</option><option value="গ" '+(ans=='গ'?'selected':'')+'>সঠিক: গ</option><option value="ঘ" '+(ans=='ঘ'?'selected':'')+'>সঠিক: ঘ</option></select>' +
            '<div class="live-preview"></div>';
            
        document.getElementById('q-container').appendChild(div);
        reorderNumbers();
        updatePreview(id); 
    }

    function removeQuestion(id) {
        var el = document.getElementById(id);
        if(el) el.remove();
        reorderNumbers();
    }

    function reorderNumbers() {
        var nos = document.getElementsByClassName('no');
        for(var i=0; i<nos.length; i++) { nos[i].innerText = (i+1); }
    }

    function saveDraft() {
        var questions = [];
        var cards = document.getElementsByClassName('q-box');
        for(var i=0; i<cards.length; i++) {
            var c = cards[i];
            questions.push({
                stim: c.querySelector('.stim').value,
                ques: c.querySelector('.ques').value,
                img: c.querySelector('.img').value,
                o1: c.querySelector('.o1').value,
                o2: c.querySelector('.o2').value,
                o3: c.querySelector('.o3').value,
                o4: c.querySelector('.o4').value,
                ans: c.querySelector('.ans').value
            });
        }
        var fullData = {
            title: document.getElementById('qTitle').value,
            sub: document.getElementById('qSub').value,
            chapter: document.getElementById('qChapter').value,
            time: document.getElementById('qTime').value,
            fName: document.getElementById('fName').value,
            questions: questions
        };
        localStorage.setItem('quiz_draft_final', JSON.stringify(fullData));
        alert("ড্রাফট সেভ হয়েছে!");
    }

    async function uploadToGithub() {
        saveDraft();
        var data = JSON.parse(localStorage.getItem('quiz_draft_final'));
        if(!data.fName) return alert("ফাইলের নাম দিন!");
        var token = localStorage.getItem('gh_token') || prompt("GitHub Token দিন:");
        if(token) localStorage.setItem('gh_token', token); else return;

        document.getElementById('loader').style.display = 'flex';
        
        // Generate final quiz file with MathJax Config
        var quizHtml = '<html><head><meta charset="UTF-8"><title>' + data.title + '</title>' +
            '<script>window.MathJax={tex:{inlineMath:[["$","$"],["\\\\(","\\\\)"]]}};\x3C/script>' +
            '<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\x2fscript>' +
            '<style>body{font-family:sans-serif; padding:20px; background:#f4f7f6;}<\/style><\/head>' +
            '<body><div class="card"><h2>' + data.title + '</h2>' +
            '<p>বিষয়: ' + data.sub + '</p>' +
            '<p>সূত্র পরীক্ষা: $x^2 + y^2 = z^2$</p></div><\/body><\/html>';

        var base64Content = btoa(unescape(encodeURIComponent(quizHtml)));
        var apiUrl = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/" + data.fName + ".html";
        
        try {
            var res = await fetch(apiUrl, {
                method: "PUT",
                headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Upload Quiz", content: base64Content })
            });
            if(res.ok) alert("সফলভাবে আপলোড হয়েছে!"); else alert("আপলোড ব্যর্থ!");
        } catch(e) { alert("Error: " + e.message); }
        
        document.getElementById('loader').style.display = 'none';
    }

    window.onload = function() {
        var saved = localStorage.getItem('quiz_draft_final');
        if(saved) {
            var d = JSON.parse(saved);
            document.getElementById('qTitle').value = d.title || "";
            document.getElementById('qSub').value = d.sub || "";
            document.getElementById('qChapter').value = d.chapter || "";
            document.getElementById('qTime').value = d.time || "";
            document.getElementById('fName').value = d.fName || "";
            if(d.questions) d.questions.forEach(q => addNewQuestion(q));
        } else { addNewQuestion(); }
    };
</script>
</body>
</html>
