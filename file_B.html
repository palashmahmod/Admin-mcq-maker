<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz Generator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-top: 60px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 12px 0; z-index: 1000; text-align: center; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: inline-block; text-decoration: none; text-align: center; }
        .btn-blue { background: var(--a); width: 100%; margin-top: 10px; }
        .btn-green { background: var(--s); width: 48%; }
        .btn-black { background: #24292e; width: 48%; }
        .btn-red { background: var(--d); padding: 5px 10px; font-size: 12px; }
        .q-box { border-left: 4px solid var(--a); padding-left: 15px; position: relative; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .preview-area { background: #f0f7ff; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 10px; border: 1px dashed #3498db; }
        .grid { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p>প্রসেসিং হচ্ছে...</p>
</div>

<div class="header">
    <span onclick="window.history.back()" style="position:absolute; left:15px; cursor:pointer"><i class="fas fa-chevron-left"></i></span>
    মাস্টার কুইজ জেনারেটর
</div>

<div class="container">
    <div class="card">
        <input type="text" id="qTitle" placeholder="কুইজের টাইটেল">
        <div class="grid">
            <input type="text" id="qSub" placeholder="বিষয়" style="width:48%">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)" style="width:48%">
        </div>
        <input type="text" id="fName" placeholder="ফাইলের নাম (যেমন: 101)">
        
        <div class="grid" style="margin-top:10px;">
            <button class="btn btn-green" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-black" onclick="uploadToGithub()"><i class="fab fa-github"></i> আপলোড করুন</button>
        </div>
    </div>

    <div id="q-container"></div>
    
    <button class="btn btn-blue" onclick="addNewQuestion()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    // কনফিগারেশন
    var GITHUB_USER = "palashmahmod";
    var GITHUB_REPO = "quiz-files";
    var qCount = 0;

    // নতুন প্রশ্ন যোগ করার ফাংশন
    function addNewQuestion(data) {
        qCount++;
        var id = "q-" + Date.now();
        var div = document.createElement('div');
        div.className = 'card q-box';
        div.id = id;
        
        var stim = data ? data.stim : "";
        var ques = data ? data.ques : "";
        var img = data ? data.img : "";
        var o1 = data ? data.o1 : "";
        var o2 = data ? data.o2 : "";
        var o3 = data ? data.o3 : "";
        var o4 = data ? data.o4 : "";
        var ans = data ? data.ans : "ক";

        div.innerHTML = 
            '<div style="display:flex; justify-content:space-between">' +
            '<b>প্রশ্ন নং: <span class="no">' + qCount + '</span></b>' +
            '<button class="btn btn-red" onclick="removeQuestion(\''+id+'\')">X</button>' +
            '</div>' +
            '<textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim">' + stim + '</textarea>' +
            '<textarea placeholder="মূল প্রশ্ন" class="ques">' + ques + '</textarea>' +
            '<input type="text" placeholder="ছবির লিঙ্ক (ঐচ্ছিক)" class="img" value="' + img + '">' +
            '<div class="grid">' +
            '<input type="text" placeholder="ক)" class="o1" value="' + o1 + '" style="width:48%">' +
            '<input type="text" placeholder="খ)" class="o2" value="' + o2 + '" style="width:48%">' +
            '</div>' +
            '<div class="grid">' +
            '<input type="text" placeholder="গ)" class="o3" value="' + o3 + '" style="width:48%">' +
            '<input type="text" placeholder="ঘ)" class="o4" value="' + o4 + '" style="width:48%">' +
            '</div>' +
            '<select class="ans">' +
            '<option value="ক" '+(ans=='ক'?'selected':'')+'>সঠিক উত্তর: ক</option>' +
            '<option value="খ" '+(ans=='খ'?'selected':'')+'>সঠিক উত্তর: খ</option>' +
            '<option value="গ" '+(ans=='গ'?'selected':'')+'>সঠিক উত্তর: গ</option>' +
            '<option value="ঘ" '+(ans=='ঘ'?'selected':'')+'>সঠিক উত্তর: ঘ</option>' +
            '</select>';

        document.getElementById('q-container').appendChild(div);
        reorderNumbers();
    }

    function removeQuestion(id) {
        var el = document.getElementById(id);
        el.parentNode.removeChild(el);
        reorderNumbers();
    }

    function reorderNumbers() {
        var nos = document.getElementsByClassName('no');
        for(var i=0; i<nos.length; i++) {
            nos[i].innerText = (i+1);
        }
    }

    // ড্রাফট সেইভ করা
    function saveDraft() {
        var questions = [];
        var cards = document.getElementsByClassName('q-box');
        for(var i=0; i<cards.length; i++) {
            var c = cards[i];
            questions.push({
                stim: c.querySelector('.stim').value,
                ques: c.querySelector('.ques').value,
                img: c.querySelector('.img').value,
                o1: c.querySelector('.o1').value,
                o2: c.querySelector('.o2').value,
                o3: c.querySelector('.o3').value,
                o4: c.querySelector('.o4').value,
                ans: c.querySelector('.ans').value
            });
        }
        var fullData = {
            title: document.getElementById('qTitle').value,
            sub: document.getElementById('qSub').value,
            time: document.getElementById('qTime').value,
            fName: document.getElementById('fName').value,
            questions: questions
        };
        localStorage.setItem('quiz_draft_new', JSON.stringify(fullData));
        alert("ড্রাফট সফলভাবে সেইভ হয়েছে!");
    }

    // গিটহাবে আপলোড করার মেইন ফাংশন
    async function uploadToGithub() {
        saveDraft();
        var data = JSON.parse(localStorage.getItem('quiz_draft_new'));
        if(!data.fName) return alert("ফাইলের নাম দিন!");

        var token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("GitHub Personal Access Token দিন:");
            if(token) localStorage.setItem('gh_token', token);
            else return;
        }

        document.getElementById('loader').style.display = 'flex';

        // জেনারেট করা হবে ফাইনাল কুইজ ফাইল
        var finalHTML = generateQuizFile(data);
        var base64Content = btoa(unescape(encodeURIComponent(finalHTML)));
        var apiUrl = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/" + data.fName + ".html";

        try {
            var getFile = await fetch(apiUrl, {
                headers: { "Authorization": "token " + token }
            });
            
            var sha = "";
            if(getFile.ok) {
                var fileData = await getFile.json();
                sha = fileData.sha;
            }

            var response = await fetch(apiUrl, {
                method: "PUT",
                headers: { 
                    "Authorization": "token " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Upload Quiz",
                    content: base64Content,
                    sha: sha ? sha : undefined
                })
            });

            if(response.ok) alert("সফলভাবে আপলোড হয়েছে!");
            else alert("আপলোড ব্যর্থ হয়েছে! টোকেন বা পারমিশন চেক করুন।");
            
        } catch(e) {
            alert("Error: " + e.message);
        }
        document.getElementById('loader').style.display = 'none';
    }

    // আউটপুট কুইজ ফাইল জেনারেটর (একদম সিম্পল ফরম্যাট)
    function generateQuizFile(d) {
        var qJson = JSON.stringify(d.questions);
        return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>'+d.title+'</title>' +
            '<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>' +
            '<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>' +
            '<style>body{font-family:sans-serif;background:#f4f7f6;padding:15px;}.card{background:white;padding:20px;border-radius:12px;max-width:500px;margin:auto;box-shadow:0 2px 5px rgba(0,0,0,0.1);}.timer{position:fixed;top:0;width:100%;left:0;background:red;color:white;text-align:center;padding:5px;z-index:10;}.opt{display:block;padding:10px;background:#eee;margin:5px 0;border-radius:5px;cursor:pointer;}<\/style><\/head><body>' +
            '<div id="main"><div class="card"><h2>'+d.title+'</h2><p>বিষয়: '+d.sub+' | সময়: '+d.time+' মিনিট</p><button onclick="start()" style="width:100%;padding:10px;background:green;color:white;border:none;">শুরু করুন</button></div></div>' +
            '<script>' +
            'var questions = ' + qJson + ';' +
            'function start(){ var h = "<div class=\'timer\' id=\'t\'></div><div class=\'card\' style=\'margin-top:40px\'>";' +
            'questions.forEach(function(q, i){ h += "<p><b>"+(i+1)+". "+q.ques+"</b></p>"+(q.img?"<img src=\'"+q.img+"\' style=\'width:100%\'>":"")+' +
            '"<label class=\'opt\'><input type=\'radio\' name=\'q"+i+"\' value=\'ক\'> ক) "+q.o1+"</label>"+' +
            '"<label class=\'opt\'><input type=\'radio\' name=\'q"+i+"\' value=\'খ\'> খ) "+q.o2+"</label>"+' +
            '"<label class=\'opt\'><input type=\'radio\' name=\'q"+i+"\' value=\'গ\'> গ) "+q.o3+"</label>"+' +
            '"<label class=\'opt\'><input type=\'radio\' name=\'q"+i+"\' value=\'ঘ\'> ঘ) "+q.o4+"</label>"; });' +
            'h += "<button onclick=\'submit()\' style=\'width:100%;padding:10px;margin-top:10px;\'>জমা দিন</button></div>"; document.getElementById("main").innerHTML = h; startTimer(); }' +
            'function startTimer(){ var sec = '+d.time+' * 60; setInterval(function(){ var m=Math.floor(sec/60), s=sec%60; document.getElementById("t").innerText="সময় বাকি: "+m+":"+s; if(sec<=0)submit(); sec--; },1000); }' +
            'function submit(){ alert("পরীক্ষা সম্পন্ন হয়েছে!"); location.reload(); }' +
            '<\/script></body></html>';
    }

    // পেজ লোড হলে ড্রাফট রিস্টোর করা
    window.onload = function() {
        var saved = localStorage.getItem('quiz_draft_new');
        if(saved) {
            var d = JSON.parse(saved);
            document.getElementById('qTitle').value = d.title || "";
            document.getElementById('qSub').value = d.sub || "";
            document.getElementById('qTime').value = d.time || "";
            document.getElementById('fName').value = d.fName || "";
            if(d.questions && d.questions.length > 0) {
                for(var i=0; i<d.questions.length; i++) {
                    addNewQuestion(d.questions[i]);
                }
            } else { addNewQuestion(); }
        } else { addNewQuestion(); }
    };
</script>

</body>
</html>
