<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz Generator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                displayMath: [['$$', '$$'], ['\\[', '\\]']] 
            },
            options: { enableMenu: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-top: 60px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 12px 0; z-index: 1000; text-align: center; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: inline-block; text-decoration: none; text-align: center; }
        .btn-blue { background: var(--a); width: 100%; margin-top: 10px; }
        .btn-green { background: var(--s); width: 48%; }
        .btn-black { background: #24292e; width: 48%; }
        .btn-red { background: var(--d); padding: 5px 10px; font-size: 12px; }
        .q-box { border-left: 4px solid var(--a); padding-left: 15px; position: relative; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
        .grid { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .live-preview { margin-top: 15px; padding: 10px; background: #fffbe6; border: 1px dashed #ffe58f; border-radius: 8px; font-size: 14px; }
        .preview-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; border-bottom: 1px solid #eee; }
        .p-stim { background: #f9f9f9; padding: 8px; border-left: 3px solid #3498db; margin-bottom: 8px; font-style: italic; }
        .p-img { width: 100%; border-radius: 6px; margin: 8px 0; display: none; }
        .p-opt { display: block; padding: 5px 10px; background: #eee; margin: 4px 0; border-radius: 4px; font-size: 13px; }
        mjx-utext { font-family: 'Segoe UI', Tahoma, sans-serif !important; font-style: normal !important; display: inline !important; direction: ltr !important; }
    </style>
</head>
<body>
<div id="loader" class="loader">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p>প্রসেসিং হচ্ছে...</p>
</div>
<div class="header">
    <span onclick="window.history.back()" style="position:absolute; left:15px; cursor:pointer"><i class="fas fa-chevron-left"></i></span>
    মাস্টার কুইজ জেনারেটর
</div>
<div class="container">
    <div class="card">
        <input type="text" id="qTitle" placeholder="কুইজের টাইটেল">
        <div class="grid">
            <input type="text" id="qSub" placeholder="বিষয়" style="width:48%">
            <input type="text" id="qChapter" placeholder="অধ্যায়" style="width:48%">
        </div>
        <div class="grid">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)" style="width:48%">
            <input type="text" id="fName" placeholder="ফাইলের নাম (যেমন: 101)" style="width:48%">
        </div>
        <div class="grid" style="margin-top:10px;">
            <button class="btn btn-green" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-black" onclick="uploadToGithub()"><i class="fab fa-github"></i> আপলোড করুন</button>
        </div>
    </div>
    <div class="card" style="text-align: center; background: #fffdf2; border: 1px dashed #d4af37;"> <p style="margin: 0 0 10px 0; font-size: 13px; color: #888; font-weight: bold;"><i class="fas fa-paste"></i> এক্সটার্নাল টেক্সট ফরম্যাট কুইজ ইনপুট</p> <button class="btn" style="background: #8e44ad; width: 100%; color: white;" onclick="pasteBulkQuestions()"><i class="fas fa-file-import"></i> বাল্ক পেস্ট করুন</button> </div>
    <div id="q-container"></div>
    <button class="btn btn-blue" onclick="addNewQuestion()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>
<script>
    var GITHUB_USER = "palashmahmod";
    var GITHUB_REPO = "quiz-files";
    var qCount = 0;
    var firebaseConfigRaw = `
        var firebaseConfig = {
            apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
            databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com",
            projectId: "quiz-storage-d8707"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        var db = firebase.database();
    `;
    function refreshMath() {
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    }
    function updatePreview(id) {
        var box = document.getElementById(id);
        var pBox = box.querySelector('.live-preview');
        var stim = box.querySelector('.stim').value;
        var ques = box.querySelector('.ques').value;
        var img = box.querySelector('.img').value;
        var o1 = box.querySelector('.o1').value;
        var o2 = box.querySelector('.o2').value;
        var o3 = box.querySelector('.o3').value;
        var o4 = box.querySelector('.o4').value;
        var no = box.querySelector('.no').innerText;
        var html = `<span class="preview-label">Live Preview</span>`;
        if(stim) html += `<div class="p-stim">${stim.replace(/\n/g, '<br>')}</div>`;
        html += `<p style="margin:5px 0"><b>${no}. ${ques.replace(/\n/g, '<br>')}</b></p>`;
        if(img) html += `<img src="${img}" class="p-img" style="display:block">`;
        if(o1) html += `<span class="p-opt">ক) ${o1}</span>`;
        if(o2) html += `<span class="p-opt">খ) ${o2}</span>`;
        if(o3) html += `<span class="p-opt">গ) ${o3}</span>`;
        if(o4) html += `<span class="p-opt">ঘ) ${o4}</span>`;
        pBox.innerHTML = html;
        refreshMath(); 
    }
    function addNewQuestion(data) {
        qCount++;
        var id = "q-" + Date.now();
        var div = document.createElement('div');
        div.className = 'card q-box';
        div.id = id;
        var stim = data ? data.stim : "";
        var ques = data ? data.ques : "";
        var img = data ? data.img : "";
        var o1 = data ? data.o1 : "";
        var o2 = data ? data.o2 : "";
        var o3 = data ? data.o3 : "";
        var o4 = data ? data.o4 : "";
        var ans = data ? data.ans : "ক";
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between">
            <b>প্রশ্ন নং: <span class="no">${qCount}</span></b>
            <button class="btn btn-red" onclick="removeQuestion('${id}')">X</button>
            </div>
            <textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim" oninput="updatePreview('${id}')">${stim}</textarea>
            <textarea placeholder="মূল প্রশ্ন" class="ques" oninput="updatePreview('${id}')">${ques}</textarea>
            <input type="text" placeholder="ছবির লিঙ্ক (PostImage Direct Link)" class="img" value="${img}" oninput="updatePreview('${id}')">
            <div class="grid">
            <input type="text" placeholder="ক)" class="o1" value="${o1}" style="width:48%" oninput="updatePreview('${id}')">
            <input type="text" placeholder="খ)" class="o2" value="${o2}" style="width:48%" oninput="updatePreview('${id}')">
            </div>
            <div class="grid">
            <input type="text" placeholder="গ)" class="o3" value="${o3}" style="width:48%" oninput="updatePreview('${id}')">
            <input type="text" placeholder="ঘ)" class="o4" value="${o4}" style="width:48%" oninput="updatePreview('${id}')">
            </div>
            <select class="ans">
            <option value="ক" ${ans=='ক'?'selected':''}>সঠিক উত্তর: ক</option>
            <option value="খ" ${ans=='খ'?'selected':''}>সঠিক উত্তর: খ</option>
            <option value="গ" ${ans=='গ'?'selected':''}>সঠিক উত্তর: গ</option>
            <option value="ঘ" ${ans=='ঘ'?'selected':''}>সঠিক উত্তর: ঘ</option>
            </select>
            <div class="live-preview"></div>`;
        document.getElementById('q-container').appendChild(div);
        reorderNumbers();
        updatePreview(id); 
    }
    function removeQuestion(id) {
        var el = document.getElementById(id);
        el.parentNode.removeChild(el);
        reorderNumbers();
        var boxes = document.getElementsByClassName('q-box');
        for(var i=0; i<boxes.length; i++) { updatePreview(boxes[i].id); }
    }
    function reorderNumbers() {
        var nos = document.getElementsByClassName('no');
        for(var i=0; i<nos.length; i++) { nos[i].innerText = (i+1); }
    }
    function saveDraft() {
        var questions = [];
        var cards = document.getElementsByClassName('q-box');
        for(var i=0; i<cards.length; i++) {
            var c = cards[i];
            questions.push({
                stim: c.querySelector('.stim').value,
                ques: c.querySelector('.ques').value,
                img: c.querySelector('.img').value,
                o1: c.querySelector('.o1').value,
                o2: c.querySelector('.o2').value,
                o3: c.querySelector('.o3').value,
                o4: c.querySelector('.o4').value,
                ans: c.querySelector('.ans').value
            });
        }
        var fullData = {
            title: document.getElementById('qTitle').value,
            sub: document.getElementById('qSub').value,
            chapter: document.getElementById('qChapter').value,
            time: document.getElementById('qTime').value,
            fName: document.getElementById('fName').value,
            questions: questions
        };
        localStorage.setItem('quiz_draft_new', JSON.stringify(fullData));
    }
    async function uploadToGithub() {
        saveDraft();
        var data = JSON.parse(localStorage.getItem('quiz_draft_new'));
        if(!data.fName) return alert("ফাইলের নাম দিন!");
        var token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("GitHub Personal Access Token দিন:");
            if(token) localStorage.setItem('gh_token', token);
            else return;
        }
        document.getElementById('loader').style.display = 'flex';
        var finalHTML = generateQuizFile(data);
        var base64Content = btoa(unescape(encodeURIComponent(finalHTML)));
        var apiUrl = "https://api.github.com/repos/" + GITHUB_USER + "/" + GITHUB_REPO + "/contents/" + data.fName + ".html";
        try {
            var getFile = await fetch(apiUrl, { headers: { "Authorization": "token " + token } });
            var sha = "";
            if(getFile.ok) { var fileData = await getFile.json(); sha = fileData.sha; }
            var response = await fetch(apiUrl, {
                method: "PUT",
                headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Upload Quiz", content: base64Content, sha: sha ? sha : undefined })
            });
            if(response.ok) alert("সফলভাবে আপলোড হয়েছে!");
            else alert("আপলোড ব্যর্থ হয়েছে!");
        } catch(e) { alert("Error: " + e.message); }
        document.getElementById('loader').style.display = 'none';
    }
    function generateQuizFile(d) {
        var qJson = JSON.stringify(d.questions);
        return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${d.title}</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\\\(', '\\\\)']] } };
    <\/script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async><\/script>
    <style>
        body{font-family:sans-serif;background:#f4f7f6;padding:15px;margin:0;user-select:none;}
        .card{background:white;padding:20px;border-radius:12px;max-width:500px;margin:10px auto;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .timer{position:fixed;top:0;left:0;width:100%;background:red;color:white;text-align:center;padding:8px;z-index:100;font-weight:bold;}
        .opt{display:block;padding:12px;background:#f0f0f0;margin:8px 0;border-radius:8px;cursor:pointer;border:1px solid #ddd;}
        input[type="radio"]{margin-right:10px;}
        button{width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
        .info-p { margin: 5px 0; font-size: 15px; }
        #exam-box { display:none; margin-top:50px; }
        .stim-box { background: #f9f9f9; padding: 10px; border-left: 4px solid #3498db; margin-bottom: 10px; font-style: italic; color: #555; }
        mjx-utext { font-family: 'Segoe UI', Tahoma, sans-serif !important; font-style: normal !important; display: inline !important; direction: ltr !important; }
    </style>
</head>
<body>
    <div id="main">
        <div class="card" id="preview-box">
            <h2 style="text-align:center; color:#2c3e50;">${d.title}</h2>
            <hr>
            <p class="info-p"><b>বিষয়:</b> ${d.sub}</p>
            <p class="info-p"><b>অধ্যায়:</b> ${d.chapter}</p>
            <p class="info-p"><b>মোট প্রশ্ন:</b> ${d.questions.length}টি</p>
            <p class="info-p"><b>সময়:</b> ${d.time} মিনিট</p>
            <p class="info-p"><b>পরীক্ষার্থী:</b> <span id="uName"></span> (ID: <span id="uIdDisplay"></span>)</p>
            <br>
            <button onclick="startExam()">পরিক্ষা শুরু করুন</button>
        </div>
        <div id="exam-box">
            <div class="timer" id="t">সময় বাকি: --:--</div>
            <div id="q-list"></div>
            <div class="card"><button id="submitBtn" onclick="submitQuiz()">জমা দিন</button></div>
        </div>
    </div>
    <script>
        ${firebaseConfigRaw}
        var questions = ${qJson};
        var fName = "${d.fName}";
        var timerInterval;
        var urlParams = new URLSearchParams(window.location.search);
        var user = {
            id: urlParams.get('id'),
            name: urlParams.get('name'),
            roll: urlParams.get('roll'),
            cls: urlParams.get('cls'),
            sec: urlParams.get('sec')
        };
        if(user.id){
            document.getElementById('uName').innerText = user.name;
            document.getElementById('uIdDisplay').innerText = user.id;
        }
        window.onload = function() {
            var savedTime = localStorage.getItem("timer_" + fName + "_" + user.id);
            if(savedTime) {
                var remaining = parseInt(savedTime) - Math.floor(Date.now()/1000);
                if(remaining > 0) startExam(remaining);
                else { alert("সময় শেষ হয়ে গেছে!"); submitQuiz(); }
            }
        };
        function saveAns(qIdx, val) {
            var saved = JSON.parse(localStorage.getItem("ans_" + fName + "_" + user.id) || "{}");
            saved[qIdx] = val;
            localStorage.setItem("ans_" + fName + "_" + user.id, JSON.stringify(saved));
        }
        function startExam(existingSec) {
            if(!existingSec) {
                localStorage.removeItem("ans_" + fName + "_" + user.id);
                localStorage.removeItem("start_time_" + fName + "_" + user.id);
            }
            if(!localStorage.getItem("start_time_" + fName + "_" + user.id)){
                localStorage.setItem("start_time_" + fName + "_" + user.id, Date.now());
            }
            document.getElementById('preview-box').style.display = 'none';
            document.getElementById('exam-box').style.display = 'block';
            var list = document.getElementById('q-list');
            var savedAns = JSON.parse(localStorage.getItem("ans_" + fName + "_" + user.id) || "{}");
            var h = "";
            questions.forEach(function(q, i){
                var s = savedAns["q"+i] || "";
                h += "<div class='card'>";
                if(q.stim && q.stim.trim() !== "") {
                    h += "<div class='stim-box'>"+q.stim.replace(/\\\\n/g, '<br>')+"</div>";
                }
                // প্রশ্নপত্রের (generated file) জন্য এখানে নিউলাইন হ্যান্ডেল করা হয়েছে
                h += "<p><b>"+(i+1)+". "+q.ques.replace(/\\\\n/g, '<br>')+"</b></p>";
                if(q.img) h += "<img src='"+q.img+"' style='width:100%;border-radius:8px;margin-bottom:10px;'>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ক' onchange='saveAns(\\"q"+i+"\\", \\"ক\\")' "+(s=='ক'?'checked':'')+"> ক) "+q.o1+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='খ' onchange='saveAns(\\"q"+i+"\\", \\"খ\\")' "+(s=='খ'?'checked':'')+"> খ) "+q.o2+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='গ' onchange='saveAns(\\"q"+i+"\\", \\"গ\\")' "+(s=='গ'?'checked':'')+"> গ) "+q.o3+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ঘ' onchange='saveAns(\\"q"+i+"\\", \\"ঘ\\")' "+(s=='ঘ'?'checked':'')+"> ঘ) "+q.o4+"</label></div>";
            });
            list.innerHTML = h;
            if(window.MathJax) window.MathJax.typeset();
            var totalSec = existingSec || (${d.time} * 60);
            if(!existingSec) {
                var expiry = Math.floor(Date.now()/1000) + totalSec;
                localStorage.setItem("timer_" + fName + "_" + user.id, expiry);
            }
            runTimer(totalSec);
        }
        function runTimer(sec) {
            timerInterval = setInterval(function(){
                var m = Math.floor(sec/60), s = sec%60;
                document.getElementById("t").innerText = "সময় বাকি: " + m + ":" + (s < 10 ? "0" : "") + s;
                if(sec <= 0){ clearInterval(timerInterval); submitQuiz(); }
                sec--;
            }, 1000);
        }
        function submitQuiz() {
            clearInterval(timerInterval);
            var startTime = localStorage.getItem("start_time_" + fName + "_" + user.id) || Date.now();
            var diff = Math.floor((Date.now() - startTime) / 1000);
            var mSpent = Math.floor(diff / 60);
            var sSpent = diff % 60;
            var timeSpentStr = mSpent + "m " + sSpent + "s";
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "জমা হচ্ছে...";
            var correct = 0;
            var wrongNums = [];
            questions.forEach(function(q, i){
    var sel = document.querySelector('input[name="q'+i+'"]:checked');
    if(sel && sel.value === q.ans) { 
        correct++; 
    } else { 
        if(sel) {
            wrongNums.push((i + 1) + "(" + sel.value + ")");
        } else {
            wrongNums.push(i + 1);
        }
    }
});
            var now = new Date();
            var resData = {
                chapter: "${d.chapter}", class: user.cls, correct: correct,
                date: now.toLocaleDateString('en-GB'), name: user.name,
                quizTitle: "${d.title}", roll: user.roll, section: user.sec,
                subject: "${d.sub}", time: now.toLocaleTimeString(),
                timeSpent: timeSpentStr, timestamp: firebase.database.ServerValue.TIMESTAMP,
                total: questions.length, userId: user.id,
                wrongQuestions: wrongNums.length > 0 ? wrongNums.join(", ") : "নাই"
            };
            var resKey = fName + "_" + Date.now();
            db.ref("QuizResults/" + resKey).set(resData).then(() => {
                return db.ref("IndividualQuizzes/" + user.id).once('value');
            }).then(snap => {
                if(val.file === fName || val.quizTitle === "${d.title}" || val.title === "${d.title}") child.ref.remove(); }); }
                localStorage.removeItem("timer_" + fName + "_" + user.id);
                localStorage.removeItem("start_time_" + fName + "_" + user.id);
                localStorage.removeItem("ans_" + fName + "_" + user.id);
                alert("পরীক্ষা সফলভাবে জমা হয়েছে!");
                
                // রিয়েল-টাইম ফলাফল বিশ্লেষণ ও ডাইনামিক রিভিউ পেজ জেনারেশন
                var reviewHtml = "<div class='card' style='border-top: 5px solid #27ae60;'>";
                reviewHtml += "<h2 style='text-align:center; color:#27ae60; margin-bottom:5px;'>🎉 পরীক্ষা সম্পন্ন হয়েছে!</h2>";
                reviewHtml += "<p style='text-align:center; color:#7f8c8d; margin-top:0;'>আপনার উত্তরপত্র সফলভাবে ডাটাবেসে জমা হয়েছে।</p><hr>";
                
                // ১ ও ২ নং নির্দেশনার তথ্য (পরীক্ষার্থী ও পরীক্ষার বিবরণ)
                reviewHtml += "<table style='width:100%; border-collapse:collapse; margin-bottom:15px; font-size:14px;'>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>পরীক্ষার্থী:</b> "+user.name+"</td><td style='padding:5px; color:#555;'><b>পরীক্ষা:</b> "+document.title+"</td></tr>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>শ্রেণী-শাখা:</b> "+user.cls+" ("+user.sec+")</td><td style='padding:5px; color:#555;'><b>বিষয়:</b> ${d.sub}</td></tr>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>রোল নং:</b> "+user.roll+"</td><td style='padding:5px; color:#555;'><b>অধ্যায়:</b> ${d.chapter}</td></tr>";
                reviewHtml += "</table><hr>";
                
                // ৩ ও ৪ নং নির্দেশনার তথ্য (পরিসংখ্যান ও সময়)
                reviewHtml += "<div style='background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:20px; font-size:14px; border-left:4px solid #3498db;'>";
                reviewHtml += "<p style='margin:4px 0;'>📊 <b>মোট প্রশ্ন:</b> "+questions.length+" টি</p>";
                reviewHtml += "<p style='margin:4px 0; color:#27ae60;'>✅ <b>সঠি উত্তর:</b> "+correct+" টি</p>";
                reviewHtml += "<p style='margin:4px 0; color:#e74c3c;'>❌ <b>ভুল ও উত্তরহীন:</b> "+(wrongNums.length > 0 ? wrongNums.join(', ') : 'নাই')+"</p>";
                reviewHtml += "<p style='margin:4px 0; color:#7f8c8d;'>📅 <b>তারিখ ও সময়:</b> "+resData.date+" | "+resData.time+"</p>";
                reviewHtml += "<p style='margin:4px 0; color:#8e44ad;'>⏱️ <b>ব্যয়কৃত সময়:</b> "+timeSpentStr+"</p>";
                reviewHtml += "</div>";
                
                reviewHtml += "<h3 style='color:#2c3e50; border-bottom:2px solid #eee; padding-bottom:8px;'>📝 প্রশ্নপত্র ও উত্তরপত্র পর্যালোচনা (Review):</h3>";
                
                // ৫ নং নির্দেশনার তথ্য (অপশনের ব্যাকগ্রাউন্ড কালার সহ সম্পূর্ণ রিভিউ কার্ড)
                questions.forEach(function(q, idx){
                    var selectedRadio = document.querySelector('input[name="q'+idx+'"]:checked');
                    var selectedVal = selectedRadio ? selectedRadio.value : null;
                    
                    reviewHtml += "<div style='margin-bottom:25px; padding-bottom:15px; border-bottom:1px dashed #ddd;'>";
                    
                    if(q.stim && q.stim.trim() !== "") {
                        reviewHtml += "<div class='stim-box'>"+q.stim.replace(/\\n/g, '<br>')+"</div>";
                    }
                    
                    reviewHtml += "<p><b>"+(idx+1)+". "+q.ques.replace(/\\n/g, '<br>')+"</b></p>";
                    if(q.img) reviewHtml += "<img src='"+q.img+"' style='width:100%;border-radius:8px;margin-bottom:10px;'>";
                    
                    // ৪টি অপশনের কাস্টম ব্যাকগ্রাউন্ড রেন্ডারিং লজিক
                    var opts = [{k:'ক', v:q.o1}, {k:'খ', v:q.o2}, {k:'গ', v:q.o3}, {k:'ঘ', v:q.o4}];
                    opts.forEach(function(opt) {
                        var bgStyle = "background:#f0f0f0; color:#000;";
                        var tickMark = "";
                        
                        if (opt.k === q.ans) {
                            tickMark = " <span style='color:#27ae60; font-weight:bold;'>✔ (সঠিক উত্তর)</span>";
                            if (selectedVal === q.ans) {
                                bgStyle = "background:#d4edda; color:#155724; font-weight:bold; border-color:#c3e6cb;"; // সঠিক উত্তর দিলে সবুজ
                            }
                        } else if (selectedVal === opt.k) {
                            bgStyle = "background:#f8d7da; color:#721c24; border-color:#f5c6cb;"; // ভুল উত্তর দিলে লাল
                        }
                        
                        reviewHtml += "<div style='padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ddd; "+bgStyle+"'>"+opt.k+") "+opt.v+tickMark+"</div>";
                    });
                    
                    reviewHtml += "</div>";
                });
                
                reviewHtml += "</div>";
                document.getElementById("main").innerHTML = reviewHtml;
                if(window.MathJax) window.MathJax.typeset();
            }).catch(e => alert(e.message));
        }
    <\/script>
</body>
</html>`;
    }
    function pasteBulkQuestions() {
    var text = prompt("আপনার কপি করা সম্পূর্ণ কুইজ টেক্সটটি নিচের বক্সে পেস্ট (Paste) করুন:");
    if (!text || text.trim() === "") return;
    
    var rawBlocks = text.split(/(?=উদ্দীপক:|^\s*\d+\s*\.)/m);
    var parsedQuestions = [];
    var currentStim = "";

    rawBlocks.forEach(block => {
        var trimmed = block.trim();
        if (!trimmed) return;

        if (trimmed.startsWith("উদ্দীপক:")) {
            var lines = trimmed.split('\n');
            currentStim = lines[0].replace(/^উদ্দীপক:\s*/, "").trim();
            lines.shift();
            block = lines.join('\n').trim();
            if (!block) return;
        }

        var lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        var qNum = null, quesText = "", imgLink = "", o1 = "", o2 = "", o3 = "", o4 = "", ans = "ক";

        lines.forEach(line => {
            var qMatch = line.match(/^(\d+)\s*\.\s*(.*)/);
            if (qMatch) { qNum = parseInt(qMatch[1]); quesText = qMatch[2].trim(); return; }
            if (line.startsWith("ছবির লিংক:")) { imgLink = line.replace(/^ছবির লিংক:\s*/, "").trim(); return; }
            if (line.includes("(ক)") || line.includes("(খ)") || line.includes("(গ)") || line.includes("(ঘ)")) {
                var optMatch = line.match(/\(ক\)\s*([^\(]*)\s*\(খ\)\s*([^\(]*)\s*\(গ\)\s*([^\(]*)\s*\(ঘ\)\s*(.*)/);
                if (optMatch) { o1 = optMatch[1].trim(); o2 = optMatch[2].trim(); o3 = optMatch[3].trim(); o4 = optMatch[4].trim(); }
                return;
            }
            if (line.startsWith("উত্তর:")) { ans = line.replace(/^উত্তর:\s*/, "").trim(); return; }
            if (qNum && !o1) { quesText += "\n" + line; }
        });

        if (qNum !== null) {
            parsedQuestions.push({ targetIdx: qNum, stim: currentStim, ques: quesText, img: imgLink, o1: o1, o2: o2, o3: o3, o4: o4, ans: ans });
        }
    });

        if (parsedQuestions.length === 0) return alert("সঠিক ফরম্যাটে কোনো প্রশ্ন পাওয়া যায়নি!");

        var existingCards = Array.from(document.getElementsByClassName('q-box'));
        parsedQuestions.forEach(pq => {
            if (pq.targetIdx <= existingCards.length) {
                var oldCard = existingCards[pq.targetIdx - 1];
                if (oldCard) oldCard.remove();
            }
        });

        var currentDraftQuestions = [];
        var freshCards = document.getElementsByClassName('q-box');
        for(var i=0; i<freshCards.length; i++) {
            var c = freshCards[i];
            currentDraftQuestions.push({
                stim: c.querySelector('.stim').value, ques: c.querySelector('.ques').value, img: c.querySelector('.img').value,
                o1: c.querySelector('.o1').value, o2: c.querySelector('.o2').value, o3: c.querySelector('.o3').value, o4: c.querySelector('.o4').value,
                ans: c.querySelector('.ans').value
            });
        }

        parsedQuestions.forEach(pq => {
            var dataObj = { stim: pq.stim, ques: pq.ques, img: pq.img, o1: pq.o1, o2: pq.o2, o3: pq.o3, o4: pq.o4, ans: pq.ans };
            if (pq.targetIdx - 1 < currentDraftQuestions.length) {
                currentDraftQuestions.splice(pq.targetIdx - 1, 0, dataObj);
            } else {
                while (currentDraftQuestions.length < pq.targetIdx - 1) {
                    currentDraftQuestions.push({ stim:"", ques:"", img:"", o1:"", o2:"", o3:"", o4:"", ans:"ক" });
                }
                currentDraftQuestions.push(dataObj);
            }
        });

        document.getElementById('q-container').innerHTML = "";
        qCount = 0;
        currentDraftQuestions.forEach(q => { addNewQuestion(q); });
        alert("ক্লিপবোর্ড থেকে সকল প্রশ্ন সফলভাবে নির্দিষ্ট ক্রমিক নম্বরে যুক্ত হয়েছে।");
}
    window.onload = function() {
        var saved = localStorage.getItem('quiz_draft_new');
        if(saved) {
            var d = JSON.parse(saved);
            document.getElementById('qTitle').value = d.title || "";
            document.getElementById('qSub').value = d.sub || "";
            document.getElementById('qChapter').value = d.chapter || "";
            document.getElementById('qTime').value = d.time || "";
            document.getElementById('fName').value = d.fName || "";
            if(d.questions) d.questions.forEach(q => addNewQuestion(q));
        } else { addNewQuestion(); }
    };
</script>
</body>
</html>
