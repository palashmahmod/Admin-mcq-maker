<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MCQ Generator - file_B</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 10px 0; z-index: 1000; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .config-card, .q-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background: var(--a); width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-gh { background: #24292e; }
        .preview-box { background: #fffde7; border: 1px dashed #fbc02d; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; z-index: 9999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader" class="loader">প্রসেসিং... অনুগ্রহ করে অপেক্ষা করুন।</div>

<div class="header">
    <button class="btn" onclick="location.href='index.html'" style="background:#555"><i class="fas fa-arrow-left"></i> ব্যাক</button>
    <b>কুইজ জেনারেটর (file_B)</b>
    <button class="btn" style="background:var(--d)" onclick="clearAll()"><i class="fas fa-trash"></i> সব মুছুন</button>
</div>

<div class="container">
    <div class="config-card">
        <div class="grid-2">
            <input type="text" id="qTitle" placeholder="কুইজের নাম (উদা: মডেল টেস্ট ১)">
            <input type="text" id="qClass" placeholder="শ্রেণি">
            <input type="text" id="qSub" placeholder="বিষয়">
            <input type="text" id="qChap" placeholder="অধ্যায়">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)">
            <input type="number" id="qMarks" placeholder="পূর্ণমান">
            <input type="text" id="fName" placeholder="ফাইলের নাম (উদা: 101)">
        </div>
        <div class="grid-2" style="margin-top:10px;">
            <button class="btn" style="background:var(--s)" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn" style="background:var(--a)" onclick="downloadHTML()"><i class="fas fa-download"></i> ডাউনলোড</button>
        </div>
        <button class="btn btn-gh" style="width:100%; margin-top:10px;" onclick="uploadToGithub()"><i class="fab fa-github"></i> গিটহাবে পাঠান</button>
    </div>

    <div id="q-area"></div>
    <button class="btn btn-add" onclick="addQ()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    const GITHUB_USER = "palashmahmod";
    const GITHUB_REPO = "quiz-files"; // আপনার রিপোজিটরি নাম
    let qCount = 0;

    function addQ(data = null) {
        qCount++;
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'q-card';
        div.id = 'block-' + id;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between"><b>প্রশ্ন নং: ${qCount}</b> 
            <button onclick="removeQ('${id}')" style="color:red; border:none; background:none; cursor:pointer">মুছুন</button></div>
            <textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim">${data?data.stim:''}</textarea>
            <textarea placeholder="মূল প্রশ্ন (এন্টার দিয়ে একাধিক লাইন লিখতে পারেন)" class="ques" oninput="updatePreview('${id}')">${data?data.ques:''}</textarea>
            <input type="text" placeholder="ছবির লিঙ্ক (যদি থাকে)" class="img" oninput="updatePreview('${id}')" value="${data?data.img:''}">
            <div class="grid-2">
                <input type="text" placeholder="ক)" class="o1" oninput="updatePreview('${id}')" value="${data?data.o1:''}">
                <input type="text" placeholder="খ)" class="o2" oninput="updatePreview('${id}')" value="${data?data.o2:''}">
                <input type="text" placeholder="গ)" class="o3" oninput="updatePreview('${id}')" value="${data?data.o3:''}">
                <input type="text" placeholder="ঘ)" class="o4" oninput="updatePreview('${id}')" value="${data?data.o4:''}">
            </div>
            <select class="ans">
                <option value="ক" ${data?.ans=='ক'?'selected':''}>সঠিক উত্তর: ক</option>
                <option value="খ" ${data?.ans=='খ'?'selected':''}>সঠিক উত্তর: খ</option>
                <option value="গ" ${data?.ans=='গ'?'selected':''}>সঠিক উত্তর: গ</option>
                <option value="ঘ" ${data?.ans=='ঘ'?'selected':''}>সঠিক উত্তর: ঘ</option>
            </select>
            <div class="preview-box" id="prev-${id}">প্রিভিউ এখানে দেখাবে...</div>
        `;
        document.getElementById('q-area').appendChild(div);
        if(data) updatePreview(id);
    }

    function updatePreview(id) {
        const block = document.getElementById('block-'+id);
        const q = block.querySelector('.ques').value.replace(/\n/g, '<br>');
        const img = block.querySelector('.img').value;
        const prev = document.getElementById('prev-'+id);
        prev.innerHTML = `<b>প্রশ্ন:</b> ${q} <br> ${img ? `<img src="${img}" style="max-width:100px; display:block; margin:5px 0;">`:''} 
        ক) ${block.querySelector('.o1').value} | খ) ${block.querySelector('.o2').value}`;
        if(window.MathJax) MathJax.typeset();
    }

    function removeQ(id) { document.getElementById('block-'+id).remove(); }
    
    function saveDraft() {
        const qs = [];
        document.querySelectorAll('.q-card').forEach(b => {
            qs.push({
                stim: b.querySelector('.stim').value, ques: b.querySelector('.ques').value,
                img: b.querySelector('.img').value, o1: b.querySelector('.o1').value,
                o2: b.querySelector('.o2').value, o3: b.querySelector('.o3').value,
                o4: b.querySelector('.o4').value, ans: b.querySelector('.ans').value
            });
        });
        const fullData = {
            title: document.getElementById('qTitle').value, cls: document.getElementById('qClass').value,
            sub: document.getElementById('qSub').value, chap: document.getElementById('qChap').value,
            time: document.getElementById('qTime').value, marks: document.getElementById('qMarks').value,
            fName: document.getElementById('fName').value, questions: qs
        };
        localStorage.setItem('draft_quiz', JSON.stringify(fullData));
        alert("ড্রাফট সেইভ হয়েছে!");
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('draft_quiz'));
        if(saved) {
            document.getElementById('qTitle').value = saved.title;
            document.getElementById('qClass').value = saved.cls;
            document.getElementById('qSub').value = saved.sub;
            document.getElementById('qChap').value = saved.chap;
            document.getElementById('qTime').value = saved.time;
            document.getElementById('qMarks').value = saved.marks;
            document.getElementById('fName').value = saved.fName;
            saved.questions.forEach(q => addQ(q));
        }
    };

    function generateFullHTML() {
        const saved = JSON.parse(localStorage.getItem('draft_quiz'));
        if(!saved) return "";
        // Template Logic (এখানে আপনার রেন্ডারিং কোড থাকবে)
        return `<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>${saved.title}</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>
    <style>body{font-family:sans-serif; background:#f0f2f5; padding:15px;} .q-box{background:white; padding:15px; margin-bottom:10px; border-radius:10px; shadow: 0 2px 5px rgba(0,0,0,0.1);}</style>
</head>
<body>
    <div id="quiz-container">
        <h2>${saved.title}</h2>
        <div id="questions"></div>
    </div>
    <script>
        const quizData = ${JSON.stringify(saved)};
        // এখানে ইউজার অ্যাপের লজিক কাজ করবে
    <\/script>
</body>
</html>`;
    }

    async function uploadToGithub() {
        saveDraft();
        const fName = document.getElementById('fName').value;
        if(!fName) return alert("ফাইলের নাম দিন!");
        
        let token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("আপনার GitHub PAT টোকেন দিন:");
            if(token) localStorage.setItem('gh_token', token);
        }

        document.getElementById('loader').style.display='flex';
        const content = btoa(unescape(encodeURIComponent(generateFullHTML())));
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fName}.html`;
        
        try {
            const check = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            let sha = "";
            if(check.ok) { const d = await check.json(); sha = d.sha; }

            const res = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Quiz Upload", content: content, sha: sha || undefined })
            });

            document.getElementById('loader').style.display='none';
            if(res.ok) alert("গিটহাবে সফলভাবে আপলোড হয়েছে!"); else alert("টোকেন ভুল বা সমস্যা হয়েছে। টোকেন রিসেট করে ট্রাই করুন।");
        } catch(e) { document.getElementById('loader').style.display='none'; alert("Error: " + e.message); }
    }

    function clearAll() { if(confirm("সব মুছতে চান?")) { localStorage.removeItem('draft_quiz'); location.reload(); } }
    function downloadHTML() {
        saveDraft();
        const blob = new Blob([generateFullHTML()], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (document.getElementById('fName').value || 'quiz') + '.html';
        a.click();
    }
</script>
</body>
</html>
