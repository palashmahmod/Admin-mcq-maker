<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Control - file_C</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--p); font-weight: bold; background: #eee; padding: 10px 20px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .status-badge { padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        .on { background: #d4edda; color: #155724; }
        .off { background: #f8d7da; color: #721c24; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> ফিরে যান</a>
    <h2>কুইজ নিয়ন্ত্রণ প্যানেল</h2>
    
    <div id="statusDisplay" class="status-badge off">বর্তমান অবস্থা: লোড হচ্ছে...</div>

    <input type="text" id="cTitle" placeholder="কুইজের শিরোনাম (উদা: গণিত পরীক্ষা)">
    <input type="text" id="cFile" placeholder="ফাইলের নাম (উদা: 601)">
    
    <div class="btn-group">
        <button class="btn" style="background:var(--s)" onclick="updateStatus('on')"><i class="fas fa-play"></i> কুইজ চালু করুন</button>
        <button class="btn" style="background:var(--d)" onclick="updateStatus('off')"><i class="fas fa-stop"></i> বন্ধ করুন</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // বর্তমান অবস্থা দেখা
    db.ref('quiz_control').on('value', (snap) => {
        const data = snap.val();
        const display = document.getElementById('statusDisplay');
        if (data && data.status === 'on') {
            display.innerText = "বর্তমান অবস্থা: চালু আছে (" + data.file + ")";
            display.className = "status-badge on";
            document.getElementById('cTitle').value = data.title || "";
            document.getElementById('cFile').value = data.file || "";
        } else {
            display.innerText = "বর্তমান অবস্থা: বন্ধ আছে";
            display.className = "status-badge off";
        }
    });

    function updateStatus(state) {
        const title = document.getElementById('cTitle').value;
        const file = document.getElementById('cFile').value;

        if (state === 'on' && (!title || !file)) {
            alert("শিরোনাম এবং ফাইলের নাম দিন!");
            return;
        }

        db.ref('quiz_control').set({
            status: state,
            title: title,
            file: file,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            alert(state === 'on' ? "কুইজ এখন শিক্ষার্থীর অ্যাপে দেখা যাবে!" : "কুইজ বন্ধ করা হয়েছে।");
        });
    }
</script>
</body>
</html>
