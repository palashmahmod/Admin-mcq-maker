<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - আইডি ম্যানেজার</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #eef2f3; padding: 20px; color: #333; margin: 0; }
        .admin-container { width: 90%; max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 16px; margin-bottom: 20px; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .full-width { grid-column: span 2; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-add { background: #27ae60; color: white; margin-top: 5px; }
        .btn-add:hover { background: #219653; }
        
        .user-list-section { text-align: center; margin-top: 20px; }
        table { width: 100%; min-width: 650px; border-collapse: collapse; margin-top: 5px; background: #fff; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #2c3e50; color: white; }
        
        .col-name { width: 30%; text-align: center; } 
        .col-action { width: 140px; white-space: nowrap; } 
        
        .action-btns-wrapper { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .btn-edit { background: #2980b9; color: white; padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-edit:hover { background: #3498db; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-del:hover { background: #c0392b; }
        
        /* টপ ন্যাভিগেশন বার - ফ্লেক্সবক্স দিয়ে বাটনের পজিশনিং */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-back { background-color: #34495e; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-back:hover { background: #95a5a6; }
        .btn-notice { background-color: #e67e22; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-notice:hover { background: #d35400; }
    </style>
</head>
<body>
<div class="admin-container">

    <div class="top-nav">
        <a href="index.html" class="btn-back">← ফিরে যান</a>
        <a href="notice.html" class="btn-notice">📢 নোটিশ লিখুন</a>
    </div>

    <h2><u>🔑 শিক্ষক আইডি ও তথ্য প্যানেল</u></h2>

    <div class="form-group">
        <input type="text" id="userId" placeholder="আইডি নম্বর">
        <input type="password" id="userPin" placeholder="পিন নম্বর">
        <input type="text" id="teacherName" placeholder="শিক্ষকের নাম" class="full-width">
        <input type="text" id="className" placeholder="শ্রেণি">
        <input type="text" id="sectionName" placeholder="শাখা/বিভাগ">
        <input type="text" id="year" placeholder="সাল (উদা: ২০২৬)" class="full-width" value="২০২৬">
        <button id="addBtn" class="btn-add full-width">নতুন আইডি যুক্ত করুন</button>
    </div>

    <div class="user-list-section">
        <h3><u>নিবন্ধিত আইডি সমূহ:</u></h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>আইডি</th>
                        <th>পিন</th>
                        <th class="col-name">নাম</th>
                        <th>শ্রেণি</th>
                        <th>শাখা</th>
                        <th>সাল</th>
                        <th class="col-action">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="7">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA_NQ7MQTKkQbvVXGAxUAAL9O50Z7OVOvw",
        authDomain: "gpa-calculation-710dc.firebaseapp.com",
        projectId: "gpa-calculation-710dc",
        storageBucket: "gpa-calculation-710dc.firebasestorage.app",
        messagingSenderId: "1092344384301",
        appId: "1:1092344384301:web:77350bd13958c125ac61a4",
        measurementId: "G-19E7DVEF4M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let localUsersData = {};

    function addUser() {
        const id = document.getElementById('userId').value.trim();
        const pin = document.getElementById('userPin').value.trim();
        const tName = document.getElementById('teacherName').value.trim();
        const cName = document.getElementById('className').value.trim();
        const sName = document.getElementById('sectionName').value.trim();
        const rYear = document.getElementById('year').value.trim();

        if(!id || !pin || !tName || !cName || !sName || !rYear) {
            alert("অনুগ্রহ করে সকল ঘর পূরণ করুন!");
            return;
        }

        const updates = {};
        updates['users/' + id + '/pin'] = pin;
        updates['users/' + id + '/teacherName'] = tName;
        updates['users/' + id + '/className'] = cName;
        updates['users/' + id + '/sectionName'] = sName;
        updates['users/' + id + '/year'] = rYear;

        update(ref(db), updates).then(() => {
            alert("তথ্য সফলভাবে সংরক্ষিত হয়েছে!");
            document.getElementById('userId').value = '';
            document.getElementById('userId').disabled = false;
            document.getElementById('userPin').value = '';
            document.getElementById('teacherName').value = '';
            document.getElementById('className').value = '';
            document.getElementById('sectionName').value = '';
            document.getElementById('year').value = '২০২৬';
            document.getElementById('addBtn').innerText = "নতুন আইডি যুক্ত করুন";
        }).catch((err) => {
            alert("Can't update data: " + err.message);
        });
    }

    window.editUser = function(id) {
        const user = localUsersData[id];
        if(user) {
            document.getElementById('userId').value = id;
            document.getElementById('userId').disabled = true;
            document.getElementById('userPin').value = user.pin || '';
            document.getElementById('teacherName').value = user.teacherName || '';
            document.getElementById('className').value = user.className || '';
            document.getElementById('sectionName').value = user.sectionName || '';
            document.getElementById('year').value = user.year || '২০২৬';
            
            document.getElementById('addBtn').innerText = "তথ্য আপডেট করুন";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    window.deleteUser = function(id) {
        if(confirm(`আপনি কি নিশ্চিত যে আইডি: ${id} মুছে ফেলতে চান? এটি ডিলিট করলে ঐ ইউজারের ডিভাইস তাৎক্ষনিক লগআউট হয়ে যাবে!`)) {
            remove(ref(db, 'users/' + id))
                .then(() => alert("আইডি মুছে ফেলা হয়েছে!"))
                .catch((err) => alert("মুছে ফেলা যায়নি: " + err.message));
        }
    }

    onValue(ref(db, 'users'), (snapshot) => {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        
        if (snapshot.exists()) {
            localUsersData = snapshot.val();
            for (let id in localUsersData) {
                const user = localUsersData[id];
                tbody.innerHTML += `
                    <tr>
                        <td><b>${id}</b></td>
                        <td>${user.pin}</td>
                        <td class="col-name">${user.teacherName}</td>
                        <td>${user.className}</td>
                        <td>${user.sectionName}</td>
                        <td>${user.year}</td>
                        <td class="col-action">
                            <div class="action-btns-wrapper">
                                <button class="btn-edit" onclick="editUser('${id}')">Edit</button>
                                <button class="btn-del" onclick="deleteUser('${id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }
        } else {
            localUsersData = {};
            tbody.innerHTML = '<tr><td colspan="7">কোনো আইডি পাওয়া যায়নি!</td></tr>';
        }
    });

    document.getElementById('addBtn').onclick = addUser;
</script>
</body>
</html>
