<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Study Control - file_G</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --a: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box { background: #fffbe6; border-color: #f1c40f; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .user-info { flex-grow: 1; }
        .user-name { font-weight: bold; color: var(--p); }
        .user-meta { font-size: 12px; color: #666; }
        .btn-send { background: #eee; color: #333; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; min-width: 100px; }
        .btn-send.active { background: var(--a); color: white; }
        .back-btn { text-decoration: none; color: var(--p); background: #eee; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> ব্যাক</a>
            <h2 style="font-size: 18px; margin: 0;">ব্যক্তিগত স্টাডি কন্ট্রোল</h2>
        </div>
    </div>

    <div style="background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px;">
        <label style="font-weight: bold; font-size: 13px;">১. মেটেরিয়াল তথ্য সেট করুন:</label>
        <input type="text" id="studyTitle" placeholder="শিরোনাম (উদা: পদার্থবিজ্ঞান অধ্যায় ১ অধ্যায়ন)">
        <input type="text" id="studyFile" placeholder="ফাইলের নাম (উদা: study_101)" oninput="renderList()">
    </div>

    <label style="font-weight: bold; font-size: 13px;">২. শিক্ষার্থী খুঁজুন ও মেটেরিয়াল পাঠান:</label>
    <input type="text" id="userSearch" class="search-box" placeholder="নাম বা আইডি দিয়ে খুঁজুন..." oninput="renderList()">
    <div id="userListArea" style="margin-top: 10px; max-height: 400px; overflow-y: auto;">লোডিং...</div>

</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco",
        databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/",
        projectId: "quiz-storage-d8707"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let allUsers = [];
    let assignedData = {};

    function init() {
        // একই Firebase থেকে ইউজার আইডি গ্রহণ করা হচ্ছে
        db.ref('users').on('value', (snap) => {
            allUsers = snap.val() ? Object.values(snap.val()) : [];
            renderList();
        });

        // MCQ পড়ার জন্য নতুন নোড বা কনফিগারেশন ট্র্যাক করা হচ্ছে
        db.ref('IndividualStudyMaterials').on('value', (snap) => {
            assignedData = snap.val() || {};
            renderList();
        });
    }

    function renderList() {
        const area = document.getElementById('userListArea');
        const searchTerm = document.getElementById('userSearch').value.toLowerCase();
        const currentFile = document.getElementById('studyFile').value.trim();
        
        const filtered = allUsers.filter(u => 
            u.name.toLowerCase().includes(searchTerm) || u.userId.toString().includes(searchTerm)
        );

        if(!filtered.length) {
            area.innerHTML = "<p style='text-align:center; color:#999;'>ইউজার পাওয়া যায়নি।</p>";
            return;
        }

        area.innerHTML = filtered.map(u => {
            // চেক করা হচ্ছে এই নির্দিষ্ট স্টাডি ফাইলটি পাঠানো আছে কি না
            const isAssigned = (assignedData[u.userId] && assignedData[u.userId][currentFile]) ? true : false;
            return `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">${u.name}</div>
                        <div class="user-meta">ID: ${u.userId} | রোল: ${u.roll}</div>
                    </div>
                    <button class="btn-send ${isAssigned ? 'active' : ''}" onclick="toggleStudyMaterial('${u.userId}')">
                        ${isAssigned ? '<i class="fas fa-check"></i> পাঠানো আছে' : 'ফাইল পাঠান'}
                    </button>
                </div>`;
        }).join('');
    }

    function toggleStudyMaterial(userId) {
        const title = document.getElementById('studyTitle').value.trim();
        const file = document.getElementById('studyFile').value.trim();

        if (!title || !file) return alert("শিরোনাম এবং ফাইল নাম দিন!");
        const path = `IndividualStudyMaterials/${userId}/${file}`;
        
        if (!assignedData[userId] || !assignedData[userId][file]) {
            db.ref(path).set({
                title: title,
                file: file,
                status: "assigned",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        } else {
            if(confirm("এই স্টাডি মেটেরিয়ালটি মুছতে চান?")) {
                db.ref(path).remove();
            }
        }
    }

    init();
</script>
</body>
</html>
